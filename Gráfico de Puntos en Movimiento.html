<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Puntos en Movimiento</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a1a;
    font-family: sans-serif;
  }

  h2 {
    color: #AFA9EC;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 0 0 16px;
  }

  canvas {
    border-radius: 14px;
    border: 1px solid rgba(175,169,236,0.25);
    display: block;
  }

  #ui {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-top: 14px;
    background: rgba(255,255,255,0.06);
    padding: 10px 22px;
    border-radius: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  #ui label { font-size: 12px; color: rgba(255,255,255,0.4); }
  #ui span  { font-size: 12px; color: rgba(255,255,255,0.85); min-width: 20px; }

  button {
    font-size: 12px;
    padding: 5px 16px;
    border-radius: 14px;
    border: 1px solid rgba(175,169,236,0.4);
    background: transparent;
    color: #AFA9EC;
    cursor: pointer;
  }
  button:hover { background: rgba(175,169,236,0.12); }
</style>
</head>
<body>

<h2>Puntos en Movimiento</h2>
<canvas id="canvas" width="580" height="400"></canvas>

<div id="ui">
  <label>Puntos</label>
  <input type="range" min="2" max="20" value="5" id="nPuntos">
  <span id="nPuntos-out">5</span>

  <label>Velocidad</label>
  <input type="range" min="1" max="20" value="5" id="vel">
  <span id="vel-out">5</span>

  <label>Líneas</label>
  <input type="checkbox" id="chkLineas" checked>

  <button id="btnPause">Pausar</button>
</div>

<script>
  const canvas = document.getElementById("canvas");
  const ctx    = canvas.getContext("2d");
  const W = canvas.width;
  const H = canvas.height;

  const COLORES = [
    "#7F77DD", "#5DCAA5", "#9b8fff",
    "#9FE1CB", "#AFA9EC", "#534AB7",
    "#1D9E75", "#FAC775", "#F09595",
    "#5DCAA5", "#ED93B1", "#85B7EB",
    "#97C459", "#EF9F27", "#D4537E",
    "#378ADD", "#639922", "#E24B4A",
    "#9FE1CB", "#AFA9EC"
  ];

  let puntos   = [];
  let pausado  = false;
  let mostrarLineas = true;
  let speed    = 5;
  let nPuntos  = 5;

  function crearPuntos(n) {
    puntos = [];
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = (Math.random() * 1.5 + 0.5) * (speed * 0.3);
      puntos.push({
        x:  Math.random() * W,
        y:  Math.random() * H,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        r:  Math.random() * 5 + 5,
        color: COLORES[i % COLORES.length],
        trail: []
      });
    }
  }

  function dibujar() {
    // Fondo con rastro
    ctx.fillStyle = "rgba(13, 13, 32, 0.3)";
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = "rgba(255,255,255,0.04)";
    ctx.lineWidth = 1;
    for (let x = 0; x <= W; x += 50) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    for (let y = 0; y <= H; y += 50) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }

    // Líneas entre puntos
    if (mostrarLineas) {
      for (let i = 0; i < puntos.length; i++) {
        for (let j = i + 1; j < puntos.length; j++) {
          const dx = puntos[i].x - puntos[j].x;
          const dy = puntos[i].y - puntos[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 180) {
            const op = (1 - dist / 180) * 0.35;
            ctx.beginPath();
            ctx.moveTo(puntos[i].x, puntos[i].y);
            ctx.lineTo(puntos[j].x, puntos[j].y);
            ctx.strokeStyle = `rgba(175,169,236,${op})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
    }

    // Estela y puntos
    puntos.forEach(p => {
      // Estela
      if (p.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(p.trail[0].x, p.trail[0].y);
        for (let k = 1; k < p.trail.length; k++) {
          ctx.lineTo(p.trail[k].x, p.trail[k].y);
        }
        ctx.strokeStyle = p.color + "55";
        ctx.lineWidth = p.r * 0.6;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      }

      // Halo exterior
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r + 5, 0, Math.PI * 2);
      ctx.fillStyle = p.color + "22";
      ctx.fill();

      // Punto principal
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();

      // Brillo interior
      ctx.beginPath();
      ctx.arc(p.x - p.r * 0.3, p.y - p.r * 0.3, p.r * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.fill();
    });
  }

  function mover() {
    if (pausado) return;

    puntos.forEach(p => {
      // Guardar estela
      p.trail.push({ x: p.x, y: p.y });
      if (p.trail.length > 12) p.trail.shift();

      p.x += p.vx;
      p.y += p.vy;

      // Rebotar en bordes
      if (p.x < p.r)     { p.x = p.r;     p.vx *= -1; }
      if (p.x > W - p.r) { p.x = W - p.r; p.vx *= -1; }
      if (p.y < p.r)     { p.y = p.r;     p.vy *= -1; }
      if (p.y > H - p.r) { p.y = H - p.r; p.vy *= -1; }
    });

    dibujar();
    requestAnimationFrame(mover);
  }

  // Controles
  document.getElementById("nPuntos").addEventListener("input", e => {
    nPuntos = parseInt(e.target.value);
    document.getElementById("nPuntos-out").textContent = nPuntos;
    crearPuntos(nPuntos);
  });

  document.getElementById("vel").addEventListener("input", e => {
    speed = parseInt(e.target.value);
    document.getElementById("vel-out").textContent = speed;
    puntos.forEach(p => {
      const ang = Math.atan2(p.vy, p.vx);
      const spd = (Math.random() * 1.5 + 0.5) * (speed * 0.3);
      p.vx = Math.cos(ang) * spd;
      p.vy = Math.sin(ang) * spd;
    });
  });

  document.getElementById("chkLineas").addEventListener("change", e => {
    mostrarLineas = e.target.checked;
  });

  document.getElementById("btnPause").addEventListener("click", function() {
    pausado = !pausado;
    this.textContent = pausado ? "Reanudar" : "Pausar";
    if (!pausado) mover();
  });

  // Fondo inicial
  ctx.fillStyle = "#0d0d20";
  ctx.fillRect(0, 0, W, H);

  crearPuntos(nPuntos);
  mover();
</script>
</body>
</html>
