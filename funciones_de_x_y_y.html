<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gráfico de Parábola</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      font-family: sans-serif;
    }

    h2 {
      color: #AFA9EC;
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0 0 16px;
    }

    canvas {
      border-radius: 14px;
      border: 1px solid rgba(175,169,236,0.25);
      display: block;
    }

    #info {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<h2>Gráfico de una función</h2>
<canvas id="myCanvas" width="520" height="520"></canvas>
<div id="info">x = &minus;y&sup2; / k &nbsp;|&nbsp; parábola horizontal</div>

<script>
  const canvas = document.getElementById('myCanvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const CX = W / 2;
  const CY = H / 2;

  // ── Fondo ───────────────────────────────────────────────
  ctx.fillStyle = "#0d0d20";
  ctx.fillRect(0, 0, W, H);

  // ── Grid menor ──────────────────────────────────────────
  ctx.strokeStyle = "rgba(255,255,255,0.04)";
  ctx.lineWidth = 1;
  const step = 50;
  for (let x = 0; x <= W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // ── Grid mayor (cada 100px) ──────────────────────────────
  ctx.strokeStyle = "rgba(175,169,236,0.08)";
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 100) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += 100) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // ── Ejes ────────────────────────────────────────────────
  ctx.strokeStyle = "rgba(175,169,236,0.55)";
  ctx.lineWidth = 1.5;

  // Eje X
  ctx.beginPath();
  ctx.moveTo(0, CY); ctx.lineTo(W, CY); ctx.stroke();

  // Eje Y
  ctx.beginPath();
  ctx.moveTo(CX, 0); ctx.lineTo(CX, H); ctx.stroke();

  // Flechas ejes
  function flecha(x, y, dir) {
    ctx.beginPath();
    if (dir === "right") {
      ctx.moveTo(x, y);
      ctx.lineTo(x - 8, y - 4);
      ctx.lineTo(x - 8, y + 4);
    } else {
      ctx.moveTo(x, y);
      ctx.lineTo(x - 4, y + 8);
      ctx.lineTo(x + 4, y + 8);
    }
    ctx.closePath();
    ctx.fillStyle = "rgba(175,169,236,0.55)";
    ctx.fill();
  }
  flecha(W - 2, CY, "right");
  flecha(CX, 2, "up");

  // Etiquetas ejes
  ctx.fillStyle = "rgba(175,169,236,0.6)";
  ctx.font = "13px sans-serif";
  ctx.fillText("x", W - 18, CY - 10);
  ctx.fillText("y", CX + 10, 16);
  ctx.fillText("0", CX + 6, CY - 6);

  // Marcas numéricas
  ctx.fillStyle = "rgba(255,255,255,0.25)";
  ctx.font = "10px sans-serif";
  ctx.textAlign = "center";
  for (let i = -2; i <= 2; i++) {
    if (i === 0) continue;
    ctx.fillText(i * 100, CX + i * 100, CY + 14);
    ctx.fillText(-i * 100, CX + 4, CY - i * 100 + 4);
  }
  ctx.textAlign = "left";

  // ── Parábola con gradiente y brillo ─────────────────────
  // Pasada 1: halo/brillo exterior
  ctx.beginPath();
  let first = true;
  for (let y = -CY; y <= CY; y++) {
    const x = -Math.pow(y, 2) / 100;
    const px = CX + x;
    const py = CY - y;
    if (first) { ctx.moveTo(px, py); first = false; }
    else ctx.lineTo(px, py);
  }
  ctx.strokeStyle = "rgba(93,202,165,0.18)";
  ctx.lineWidth = 10;
  ctx.lineJoin = "round";
  ctx.stroke();

  // Pasada 2: línea principal con gradiente
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,    "#9FE1CB");
  grad.addColorStop(0.5,  "#1D9E75");
  grad.addColorStop(1,    "#9FE1CB");

  ctx.beginPath();
  first = true;
  for (let y = -CY; y <= CY; y++) {
    const x = -Math.pow(y, 2) / 100;
    const px = CX + x;
    const py = CY - y;
    if (first) { ctx.moveTo(px, py); first = false; }
    else ctx.lineTo(px, py);
  }
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // ── Vértice destacado ───────────────────────────────────
  ctx.beginPath();
  ctx.arc(CX, CY, 5, 0, Math.PI * 2);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.strokeStyle = "#5DCAA5";
  ctx.lineWidth = 2;
  ctx.stroke();

  // Etiqueta vértice
  ctx.fillStyle = "rgba(255,255,255,0.65)";
  ctx.font = "11px sans-serif";
  ctx.fillText("vértice (0, 0)", CX + 10, CY - 10);

  // Etiqueta función
  ctx.fillStyle = "rgba(93,202,165,0.8)";
  ctx.font = "13px sans-serif";
  ctx.fillText("x = −y² / 100", 30, 30);

</script>
</body>
</html>
