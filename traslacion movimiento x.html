<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Traslación 3D</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#wrap { position: relative; width: 100%; height: 100vh; overflow: hidden; background: #0a0a1a; }
#titulo { position: absolute; top: 14px; left: 18px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(175,169,236,0.55); z-index: 10; font-family: sans-serif; }
#hud { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10; }
.stat { background: rgba(10,10,30,0.75); border: 1px solid rgba(175,169,236,0.2); border-radius: 10px; padding: 5px 14px; font-size: 11px; color: rgba(255,255,255,0.4); text-align: center; min-width: 90px; font-family: sans-serif; }
.stat span { display: block; font-size: 13px; font-weight: 500; color: #AFA9EC; margin-top: 1px; }
#ui { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; align-items: center; background: rgba(10,10,30,0.8); border: 1px solid rgba(175,169,236,0.18); border-radius: 20px; padding: 8px 18px; z-index: 10; white-space: nowrap; font-family: sans-serif; }
#ui label { font-size: 11px; color: rgba(255,255,255,0.4); }
#ui span { font-size: 11px; color: rgba(255,255,255,0.85); min-width: 20px; }
#ui select, #ui button { font-size: 11px; padding: 3px 10px; border-radius: 10px; border: 1px solid rgba(175,169,236,0.3); background: rgba(10,10,30,0.9); color: #AFA9EC; cursor: pointer; }
#ui button:hover { background: rgba(175,169,236,0.12); }
canvas { position: absolute; top: 0; left: 0; display: block; }
</style>
</head>
<body>

<div id="wrap">
  <div id="titulo">TRASLACIÓN 3D</div>
  <div id="hud">
    <div class="stat">Posición <span id="px">0.00</span></div>
    <div class="stat">Velocidad <span id="vx">0.05</span></div>
    <div class="stat">Dirección <span id="dir">→</span></div>
  </div>
  <div id="ui">
    <label>Velocidad</label>
    <input type="range" min="1" max="20" value="5" id="vel" style="width:80px;">
    <span id="vel-out">5</span>
    <label>Eje</label>
    <select id="eje">
      <option value="x">Eje X</option>
      <option value="y">Eje Y</option>
      <option value="z">Eje Z</option>
    </select>
    <button id="btnPause">Pausar</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const wrap = document.getElementById('wrap');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.055);

const camera = new THREE.PerspectiveCamera(60, wrap.clientWidth / wrap.clientHeight, 0.1, 1000);
camera.position.set(0, 1.5, 7);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(wrap.clientWidth, wrap.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
wrap.insertBefore(renderer.domElement, wrap.firstChild);

scene.add(new THREE.AmbientLight(0x222244, 2));

const luz1 = new THREE.PointLight(0x7F77DD, 4, 25);
luz1.position.set(5, 5, 5);
luz1.castShadow = true;
scene.add(luz1);

const luz2 = new THREE.PointLight(0x5DCAA5, 3, 25);
luz2.position.set(-5, 2, 3);
scene.add(luz2);

const grid = new THREE.GridHelper(16, 16, 0x2a2a4a, 0x1a1a2e);
grid.position.y = -2;
scene.add(grid);

const suelo = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.ShadowMaterial({ opacity: 0.3 })
);
suelo.rotation.x = -Math.PI / 2;
suelo.position.y = -2;
suelo.receiveShadow = true;
scene.add(suelo);

const geo = new THREE.BoxGeometry(1.3, 1.3, 1.3);
const mat = new THREE.MeshPhongMaterial({
  color: 0x7F77DD,
  emissive: 0x2a1a6e,
  specular: 0xffffff,
  shininess: 90
});
const mesh = new THREE.Mesh(geo, mat);
mesh.castShadow = true;
scene.add(mesh);

const aristas = new THREE.LineSegments(
  new THREE.EdgesGeometry(geo),
  new THREE.LineBasicMaterial({ color: 0xAFA9EC, transparent: true, opacity: 0.5 })
);
mesh.add(aristas);

const sombra = new THREE.Mesh(
  new THREE.CircleGeometry(0.65, 32),
  new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 })
);
sombra.rotation.x = -Math.PI / 2;
sombra.position.y = -1.99;
scene.add(sombra);

const estelaMax = 18;
const estelaPool = [];
for (let i = 0; i < estelaMax; i++) {
  const e = new THREE.Mesh(
    new THREE.BoxGeometry(1.3, 1.3, 1.3),
    new THREE.MeshBasicMaterial({ color: 0x7F77DD, transparent: true, opacity: 0 })
  );
  scene.add(e);
  estelaPool.push(e);
}

const starPos = new Float32Array(500 * 3);
for (let i = 0; i < 500 * 3; i++) starPos[i] = (Math.random() - 0.5) * 80;
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, transparent: true, opacity: 0.45 })));

const lineaGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-3, 0, 0), new THREE.Vector3(3, 0, 0)
]);
const lineaMesh = new THREE.Line(lineaGeo, new THREE.LineBasicMaterial({ color: 0x534AB7, transparent: true, opacity: 0.4 }));
scene.add(lineaMesh);

[-3, 3].forEach(px => {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0x5DCAA5 })
  );
  m.position.set(px, 0, 0);
  scene.add(m);
});

let velocidad = 0.05;
let pausado = false;
let eje = "x";
let estelaIdx = 0;
let frameCount = 0;
const LIMITE = 3;

document.getElementById("vel").addEventListener("input", e => {
  const v = parseFloat(e.target.value);
  document.getElementById("vel-out").textContent = v;
  velocidad = (velocidad >= 0 ? 1 : -1) * v * 0.01;
});

document.getElementById("eje").addEventListener("change", e => {
  mesh.position.set(0, 0, 0);
  eje = e.target.value;
  const pts = {
    x: [new THREE.Vector3(-3,0,0), new THREE.Vector3(3,0,0)],
    y: [new THREE.Vector3(0,-3,0), new THREE.Vector3(0,3,0)],
    z: [new THREE.Vector3(0,0,-3), new THREE.Vector3(0,0,3)],
  };
  lineaGeo.setFromPoints(pts[eje]);
});

document.getElementById("btnPause").addEventListener("click", function() {
  pausado = !pausado;
  this.textContent = pausado ? "Reanudar" : "Pausar";
});

window.addEventListener("resize", () => {
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
});

const elPx = document.getElementById("px");
const elVx = document.getElementById("vx");
const elDir = document.getElementById("dir");

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.01;

  if (!pausado) {
    mesh.position[eje] += velocidad;
    if (mesh.position[eje] > LIMITE || mesh.position[eje] < -LIMITE) velocidad *= -1;

    mesh.rotation.y += 0.012;
    mesh.rotation.x = Math.sin(t * 0.4) * 0.25;

    frameCount++;
    if (frameCount % 2 === 0) {
      const ep = estelaPool[estelaIdx % estelaMax];
      ep.position.copy(mesh.position);
      ep.rotation.copy(mesh.rotation);
      ep.material.opacity = 0.12;
      estelaIdx++;
    }
    estelaPool.forEach(ep => { ep.material.opacity *= 0.88; });

    luz1.position.x = Math.cos(t * 0.6) * 6;
    luz1.position.z = Math.sin(t * 0.6) * 6;
    luz2.position.x = Math.cos(t * 0.4 + Math.PI) * 5;
    luz2.position.z = Math.sin(t * 0.4 + Math.PI) * 5;

    sombra.position.x = mesh.position.x;
    sombra.position.z = mesh.position.z;
  }

  elPx.textContent = mesh.position[eje].toFixed(2);
  elVx.textContent = Math.abs(velocidad).toFixed(3);
  elDir.textContent = velocidad > 0 ? "→" : "←";

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
