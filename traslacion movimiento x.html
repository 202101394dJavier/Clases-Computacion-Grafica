<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Traslación 3D</title>
<style>
body { margin: 0; overflow: hidden; background: #0a0a1a; font-family: sans-serif; }

#titulo {
  position: fixed;
  top: 20px;
  left: 24px;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(175,169,236,0.55);
  z-index: 10;
}

#hud {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  z-index: 10;
}

.stat {
  background: rgba(10,10,30,0.75);
  border: 1px solid rgba(175,169,236,0.2);
  border-radius: 10px;
  padding: 7px 16px;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  backdrop-filter: blur(6px);
  min-width: 100px;
  text-align: center;
}
.stat span {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #AFA9EC;
  margin-top: 2px;
}

#ui {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 14px;
  align-items: center;
  background: rgba(10,10,30,0.75);
  border: 1px solid rgba(175,169,236,0.18);
  border-radius: 20px;
  padding: 10px 22px;
  backdrop-filter: blur(8px);
  z-index: 10;
}

#ui label { font-size: 12px; color: rgba(255,255,255,0.4); }
#ui span  { font-size: 12px; color: rgba(255,255,255,0.85); min-width: 24px; }

select {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 10px;
  border: 1px solid rgba(175,169,236,0.3);
  background: rgba(10,10,30,0.9);
  color: #AFA9EC;
  cursor: pointer;
}

button {
  font-size: 12px;
  padding: 5px 16px;
  border-radius: 14px;
  border: 1px solid rgba(175,169,236,0.4);
  background: transparent;
  color: #AFA9EC;
  cursor: pointer;
}
button:hover { background: rgba(175,169,236,0.12); }
</style>
</head>
<body>

<div id="titulo">Traslación 3D</div>

<div id="hud">
  <div class="stat">Posición X <span id="px">0.00</span></div>
  <div class="stat">Velocidad  <span id="vx">0.05</span></div>
  <div class="stat">Dirección  <span id="dir">→</span></div>
</div>

<div id="ui">
  <label>Velocidad</label>
  <input type="range" min="1" max="20" value="5" id="vel">
  <span id="vel-out">5</span>

  <label>Eje</label>
  <select id="eje">
    <option value="x">Eje X</option>
    <option value="y">Eje Y</option>
    <option value="z">Eje Z</option>
  </select>

  <label>Figura</label>
  <select id="figura">
    <option value="cubo">Cubo</option>
    <option value="esfera">Esfera</option>
    <option value="toroide">Toroide</option>
    <option value="octaedro">Octaedro</option>
  </select>

  <button id="btnPause">Pausar</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Escena ────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.055);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 7);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ── Luces ─────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x222244, 1));

const luz1 = new THREE.PointLight(0x7F77DD, 3, 20);
luz1.position.set(5, 5, 5);
luz1.castShadow = true;
scene.add(luz1);

const luz2 = new THREE.PointLight(0x5DCAA5, 2, 20);
luz2.position.set(-5, 2, 3);
scene.add(luz2);

// ── Grid y suelo ──────────────────────────────────────────
scene.add(Object.assign(new THREE.GridHelper(16, 16, 0x2a2a4a, 0x1a1a2e), { position: { x: 0, y: -2, z: 0 } }));

const suelo = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.ShadowMaterial({ opacity: 0.3 })
);
suelo.rotation.x = -Math.PI / 2;
suelo.position.y = -2;
suelo.receiveShadow = true;
scene.add(suelo);

// ── Figura ────────────────────────────────────────────────
function crearGeo(tipo) {
  switch(tipo) {
    case "esfera":   return new THREE.SphereGeometry(0.85, 48, 48);
    case "toroide":  return new THREE.TorusGeometry(0.7, 0.3, 24, 80);
    case "octaedro": return new THREE.OctahedronGeometry(1.0);
    default:         return new THREE.BoxGeometry(1.3, 1.3, 1.3);
  }
}

function crearMat() {
  return new THREE.MeshPhongMaterial({
    color: 0x7F77DD,
    emissive: 0x2a1a6e,
    specular: 0xffffff,
    shininess: 90,
  });
}

let mesh = new THREE.Mesh(crearGeo("cubo"), crearMat());
mesh.castShadow = true;
scene.add(mesh);

let aristas = new THREE.LineSegments(
  new THREE.EdgesGeometry(mesh.geometry),
  new THREE.LineBasicMaterial({ color: 0xAFA9EC, transparent: true, opacity: 0.5 })
);
mesh.add(aristas);

// Sombra en suelo
const sombra = new THREE.Mesh(
  new THREE.CircleGeometry(0.65, 32),
  new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 })
);
sombra.rotation.x = -Math.PI / 2;
sombra.position.y = -1.99;
scene.add(sombra);

// ── Estela ────────────────────────────────────────────────
const estelaMax = 18;
const estelaPool = [];
for (let i = 0; i < estelaMax; i++) {
  const e = new THREE.Mesh(
    new THREE.BoxGeometry(1.3, 1.3, 1.3),
    new THREE.MeshBasicMaterial({
      color: 0x7F77DD,
      transparent: true,
      opacity: 0
    })
  );
  scene.add(e);
  estelaPool.push(e);
}

// ── Estrellas ─────────────────────────────────────────────
const starPos = new Float32Array(500 * 3);
for (let i = 0; i < 500 * 3; i++) starPos[i] = (Math.random() - 0.5) * 80;
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
  color: 0xffffff, size: 0.07, transparent: true, opacity: 0.45
})));

// ── Línea de recorrido ────────────────────────────────────
const lineaGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-3, 0, 0),
  new THREE.Vector3( 3, 0, 0)
]);
const lineaMesh = new THREE.Line(lineaGeo,
  new THREE.LineBasicMaterial({ color: 0x534AB7, transparent: true, opacity: 0.4 })
);
scene.add(lineaMesh);

// Marcadores en los límites
[-3, 3].forEach(px => {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0x5DCAA5 })
  );
  m.position.set(px, 0, 0);
  scene.add(m);
});

// ── Estado ────────────────────────────────────────────────
let velocidad = 0.05;
let pausado   = false;
let eje       = "x";
let ejeAnterior = "x";

const LIMITE = 3;
let estelaIdx = 0;
let frameCount = 0;

// ── Controles ─────────────────────────────────────────────
document.getElementById("vel").addEventListener("input", e => {
  const v = parseFloat(e.target.value);
  document.getElementById("vel-out").textContent = v;
  velocidad = (velocidad > 0 ? 1 : -1) * v * 0.01;
});

document.getElementById("eje").addEventListener("change", e => {
  // Reset posición al cambiar eje
  mesh.position.set(0, 0, 0);
  velocidad = Math.abs(velocidad) * (velocidad > 0 ? 1 : -1);
  eje = e.target.value;

  // Actualizar línea de recorrido
  const pts = {
    x: [new THREE.Vector3(-3,0,0), new THREE.Vector3(3,0,0)],
    y: [new THREE.Vector3(0,-3,0), new THREE.Vector3(0,3,0)],
    z: [new THREE.Vector3(0,0,-3), new THREE.Vector3(0,0,3)],
  };
  lineaGeo.setFromPoints(pts[eje]);
});

document.getElementById("figura").addEventListener("change", e => {
  mesh.remove(aristas);
  scene.remove(mesh);
  const geo = crearGeo(e.target.value);
  mesh = new THREE.Mesh(geo, crearMat());
  mesh.castShadow = true;
  aristas = new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0xAFA9EC, transparent: true, opacity: 0.5 })
  );
  mesh.add(aristas);
  scene.add(mesh);
});

document.getElementById("btnPause").addEventListener("click", function() {
  pausado = !pausado;
  this.textContent = pausado ? "Reanudar" : "Pausar";
});

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── HUD refs ──────────────────────────────────────────────
const elPx  = document.getElementById("px");
const elVx  = document.getElementById("vx");
const elDir = document.getElementById("dir");

// ── Animación ─────────────────────────────────────────────
let t = 0;

function animate() {
  requestAnimationFrame(animate);
  t += 0.01;

  if (!pausado) {
    // Traslación (igual que el original, en el eje elegido)
    mesh.position[eje] += velocidad;

    if (mesh.position[eje] > LIMITE || mesh.position[eje] < -LIMITE) {
      velocidad *= -1;
    }

    // Rotación suave
    mesh.rotation.y += 0.012;
    mesh.rotation.x = Math.sin(t * 0.4) * 0.25;

    // Estela cada 2 frames
    frameCount++;
    if (frameCount % 2 === 0) {
      const e = estelaPool[estelaIdx % estelaMax];
      e.position.copy(mesh.position);
      e.rotation.copy(mesh.rotation);
      e.material.opacity = 0.12;
      estelaIdx++;
    }

    // Fade estela
    estelaPool.forEach(e => {
      e.material.opacity *= 0.88;
    });

    // Luces orbitando
    luz1.position.x = Math.cos(t * 0.6) * 6;
    luz1.position.z = Math.sin(t * 0.6) * 6;
    luz2.position.x = Math.cos(t * 0.4 + Math.PI) * 5;
    luz2.position.z = Math.sin(t * 0.4 + Math.PI) * 5;

    // Sombra
    sombra.position.x = mesh.position.x;
    sombra.position.z = mesh.position.z;
  }

  // HUD
  elPx.textContent  = mesh.position[eje].toFixed(2);
  elVx.textContent  = Math.abs(velocidad).toFixed(3);
  elDir.textContent = velocidad > 0 ? "→" : "←";

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
